# Reverse-proxy под одним доменом → cookie остаются first-party.
# TLS терминируется здесь же: сертификат Let's Encrypt выпускается на ХОСТЕ через
# `certbot --standalone` ДО `compose up` и монтируется в контейнер (/etc/letsencrypt).
# Cloudflare в режиме DNS-only (серое облако) → клиенты ходят прямо на origin:443.

upstream t2r_backend  { server backend:8000; }
upstream t2r_frontend { server frontend:3000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP :80 → редирект на HTTPS (и проброс ACME-челленджа для продления) ---
server {
    listen 80;
    server_name analyticaloslik.com www.analyticaloslik.com;

    # certbot webroot-челлендж (на случай продления через webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 ---
server {
    listen 443 ssl;
    http2 on;
    server_name analyticaloslik.com www.analyticaloslik.com;

    ssl_certificate     /etc/letsencrypt/live/analyticaloslik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analyticaloslik.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    # Размер выгрузок/запросов
    client_max_body_size 25m;

    # --- API на тот же домен ---
    location /api/ {
        proxy_pass http://t2r_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: отключаем буферизацию и держим соединение долго.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # healthz/readyz напрямую в бэкенд (для мониторинга)
    location ~ ^/(healthz|readyz)$ {
        proxy_pass http://t2r_backend;
        proxy_set_header Host $host;
    }

    # --- Фронт (Next.js) ---
    location / {
        proxy_pass http://t2r_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
