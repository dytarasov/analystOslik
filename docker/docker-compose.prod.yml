# Прод-стек за одним доменом (nginx reverse-proxy). Отдельное имя проекта →
# собственные volume'ы (не пересекаются с dev docker-compose.yml).
#
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Перед запуском: заполните backend/.env (T2R_ENV=prod, T2R_ACCESS_KEY=<uuid>,
# секреты) и пробросьте TLS на nginx (или терминируйте TLS на внешнем LB,
# который шлёт X-Forwarded-Proto=https).
name: t2r_prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: t2r
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-t2r}
      POSTGRES_DB: t2r
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "t2r"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-t2r_neo4j_pass}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: demo
      CLICKHOUSE_USER: demo
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-demo}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - ../backend/.env
    environment:
      T2R_ENV: prod
      T2R_PG_DSN: postgresql+asyncpg://t2r:${POSTGRES_PASSWORD:-t2r}@postgres:5432/t2r
      T2R_NEO4J_URI: bolt://neo4j:7687
      T2R_NEO4J_USER: neo4j
      T2R_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-t2r_neo4j_pass}
      # bcrypt-хеш админа берём из shell-env: `export T2R_ADMIN_PASSWORD_HASH='$2b$12$...'`
      # ПЕРЕД `compose up` (в shell-значении `$` НЕ удваивают). Рабочий хеш НЕ хардкодим
      # в публичный репозиторий; compose упадёт с понятной ошибкой, если переменная не задана.
      T2R_ADMIN_PASSWORD_HASH: ${T2R_ADMIN_PASSWORD_HASH:?export T2R_ADMIN_PASSWORD_HASH before compose up}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Доверяем X-Forwarded-* от nginx (схема/клиентский IP).
    command: ["uvicorn", "t2r.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*"]
    volumes:
      - exports:/var/t2r/exports
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.prod
      args:
        # Один домен → относительные пути; экран ключа включён.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_REQUIRE_ACCESS_KEY: "1"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Сертификаты Let's Encrypt, выпущенные на хосте через `certbot --standalone`
      # ДО `compose up` (см. DEPLOY.md). nginx читает их в read-only.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  clickhouse_data:
  exports:
