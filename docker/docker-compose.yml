services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: t2r_postgres
    environment:
      POSTGRES_USER: t2r
      POSTGRES_PASSWORD: t2r
      POSTGRES_DB: t2r
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "t2r"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.20-community
    container_name: t2r_neo4j
    environment:
      NEO4J_AUTH: neo4j/t2r_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: t2r_clickhouse
    environment:
      CLICKHOUSE_DB: demo
      CLICKHOUSE_USER: demo
      CLICKHOUSE_PASSWORD: demo
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  ch-seeder:
    build:
      context: ./seed
      dockerfile: Dockerfile
    container_name: t2r_ch_seeder
    profiles: ["seed"]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CH_HOST: clickhouse
      CH_PORT: 8123
      CH_USER: demo
      CH_PASS: demo
    volumes:
      # data.zip распакован сюда — три CSV (~898 МБ): cdm.teachers_events_daily,
      # dict.teachers, dict.schools. Каталог в .gitignore.
      - ./seed/data:/seed-data:ro

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: t2r_backend
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - ../backend/.env
    environment:
      T2R_PG_DSN: postgresql+asyncpg://t2r:t2r@postgres:5432/t2r
      T2R_NEO4J_URI: bolt://neo4j:7687
      T2R_NEO4J_USER: neo4j
      T2R_NEO4J_PASSWORD: t2r_neo4j_pass
      # Compose интерпретирует `$VAR` в env_file как substitution и съедает
      # кусок bcrypt-хеша между долларами. Передаём значение здесь с
      # экранированными `$$` — compose превратит в литеральный `$`.
      T2R_ADMIN_PASSWORD_HASH: '$$2b$$12$$h4pvfNzIQqqkjl6MSp357.i8bb8A8OMOUtQRHbRBow31VZ15quDS.'
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../migrations:/migrations
      - exports:/var/t2r/exports

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: t2r_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  neo4j_data:
  clickhouse_data:
  exports:
  frontend_node_modules:
